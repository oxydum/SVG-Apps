<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#080604"/>

    <style>
        :root { --width-off: 1; --width-on: 3; }
        .seg {
        fill: none; stroke-linecap: round; stroke-linejoin: round;
        stroke-width: var(--width-off); opacity: 0.1; transform: scale(0.85);
        transform-box: view-box; transform-origin: 400px 400px;
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s ease, stroke-width 0.4s ease, filter 0.8s ease;
        }
        .seg.on { stroke-width: var(--width-on); opacity: 1; transform: scale(1); }

        .s-seg { stroke: #1A1505; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #FFD700; filter: drop-shadow(0 0 8px #DAA520); } /* Laiton */

        .m-seg { stroke: #150A05; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #B87333; filter: drop-shadow(0 0 8px #8B4513); } /* Cuivre */

        .h-seg { stroke: #050A10; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #708090; filter: drop-shadow(0 0 8px #4682B4); } /* Acier */
    </style>

    <g>
        <!-- HEURES (Acier) -->
        <!-- 15 : Petit Manomètre + Aiguille -->
        <path id="h-15" class="seg h-seg" d="M 428,428 A 40,40 0 1,1 372,428 M 400,400 L 400,370" />
        <!-- 8 : Petit Ressort \ -->
        <path id="h-8"  class="seg h-seg" d="M 360,375 C 375,395 385,395 400,375 C 415,355 425,355 440,375" />
        <!-- 4 : Petit Ressort / -->
        <path id="h-4"  class="seg h-seg" d="M 360,425 C 375,405 385,405 400,425 C 415,445 425,445 440,425" />
        <!-- 2 : Piston Horizontal -->
        <path id="h-2"  class="seg h-seg" d="M 360,400 L 380,400 M 420,400 L 440,400 M 380,392 L 380,408 M 420,392 L 420,408" />
        <!-- 1 : Piston Vertical -->
        <path id="h-1"  class="seg h-seg" d="M 400,360 L 400,380 M 400,420 L 400,440 M 392,380 L 408,380 M 392,420 L 408,420" />

        <!-- MINUTES (Cuivre) -->
        <!-- 30 : Grand Manomètre + Aiguille -->
        <path id="m-30" class="seg m-seg" d="M 491,491 A 130,130 0 1,1 309,491 M 400,400 L 400,280" />
        <!-- 15 : Moyen Manomètre + Aiguille -->
        <path id="m-15" class="seg m-seg" d="M 453,453 A 75,75 0 1,1 347,453 M 400,400 L 400,335" />
        <!-- 8 : Moyen Ressort \ -->
        <path id="m-8"  class="seg m-seg" d="M 270,300 C 310,360 350,360 400,300 C 450,240 490,240 530,300" />
        <!-- 4 : Moyen Ressort / -->
        <path id="m-4"  class="seg m-seg" d="M 270,500 C 310,440 350,440 400,500 C 450,560 490,560 530,500" />
        <!-- 2 : Piston Horizontal -->
        <path id="m-2"  class="seg m-seg" d="M 270,400 L 330,400 M 470,400 L 530,400 M 330,390 L 330,410 M 470,390 L 470,410" />
        <!-- 1 : Piston Vertical -->
        <path id="m-1"  class="seg m-seg" d="M 400,270 L 400,330 M 400,470 L 400,530 M 390,330 L 410,330 M 390,470 L 410,470" />

        <!-- SECONDES (Laiton) -->
        <!-- 30 : Très Grand Manomètre + Aiguille -->
        <path id="s-30" class="seg s-seg" d="M 527,527 A 180,180 0 1,1 273,527 M 400,400 L 400,240" />
        <!-- 15 : Grand Manomètre + Aiguille -->
        <path id="s-15" class="seg s-seg" d="M 478,478 A 110,110 0 1,1 322,478 M 400,400 L 400,300" />
        <!-- 8 : Grand Ressort \ -->
        <path id="s-8"  class="seg s-seg" d="M 220,260 C 280,360 360,360 400,260 C 440,160 520,160 580,260" />
        <!-- 4 : Grand Ressort / -->
        <path id="s-4"  class="seg s-seg" d="M 220,540 C 280,440 360,440 400,540 C 440,640 520,640 580,540" />
        <!-- 2 : Piste de Piston Horizontal -->
        <path id="s-2"  class="seg s-seg" d="M 220,400 L 300,400 M 500,400 L 580,400 M 300,385 L 300,415 M 500,385 L 500,415" />
        <!-- 1 : Piste de Piston Vertical -->
        <path id="s-1"  class="seg s-seg" d="M 400,220 L 400,300 M 400,500 L 400,580 M 385,300 L 415,300 M 385,500 L 415,500" />
    </g>

    <script type="text/javascript">
        //<![CDATA[
        const seqH = [15, 8, 4, 2, 1]; const seqMS = [30, 15, 8, 4, 2, 1];
        function updatePole(p, v, s) { let r = v; s.forEach(w => { const e = document.getElementById(`${p}-${w}`); if(!e) return; if(r >= w) { e.classList.add('on'); r -= w; } else { e.classList.remove('on'); } }); }
        function updateClock() { const n = new Date(); updatePole('h', n.getHours(), seqH); updatePole('m', n.getMinutes(), seqMS); updatePole('s', n.getSeconds(), seqMS); }
        setInterval(updateClock, 1000); updateClock();
        //]]>
    </script>
</svg>
