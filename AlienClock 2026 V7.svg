<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#050205"/>

    <style>
        :root { --width-off: 1; --width-on: 3; }
        .seg {
        fill: none; stroke-linecap: round; stroke-linejoin: miter; /* Angles vifs et mystiques */
        stroke-width: var(--width-off); opacity: 0.1; transform: scale(0.85);
        transform-box: view-box; transform-origin: 400px 400px;
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s ease, stroke-width 0.4s ease, filter 0.8s ease;
        }
        .seg.on { stroke-width: var(--width-on); opacity: 1; transform: scale(1); }

        .s-seg { stroke: #0A0805; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #FFD700; filter: drop-shadow(0 0 8px #FFA500); } /* Or Ancien */

        .m-seg { stroke: #0A0205; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #DC143C; filter: drop-shadow(0 0 8px #8B0000); } /* Rouge Sang */

        .h-seg { stroke: #050A0A; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #40E0D0; filter: drop-shadow(0 0 8px #008080); } /* Turquoise Patiné */
    </style>

    <g>
        <!-- HEURES (Turquoise) -->
        <!-- 15 : Losange (Carré 45°) -->
        <path id="h-15" class="seg h-seg" d="M 400,360 L 440,400 L 400,440 L 360,400 Z" />
        <!-- 8 : Angle Runique \ -->
        <path id="h-8"  class="seg h-seg" d="M 360,375 L 400,395 L 440,375 M 400,395 L 400,420" />
        <!-- 4 : Angle Runique / -->
        <path id="h-4"  class="seg h-seg" d="M 360,425 L 400,405 L 440,425 M 400,405 L 400,380" />
        <!-- 2 : Croix à embouts Diamant -->
        <path id="h-2"  class="seg h-seg" d="M 360,400 L 380,400 M 420,400 L 440,400 M 400,395 L 400,405" />
        <!-- 1 : Croix à embouts Diamant -->
        <path id="h-1"  class="seg h-seg" d="M 400,360 L 400,380 M 400,420 L 400,440 M 395,400 L 405,400" />

        <!-- MINUTES (Rouge Sang) -->
        <!-- 30 : Grand Losange -->
        <path id="m-30" class="seg m-seg" d="M 400,270 L 530,400 L 400,530 L 270,400 Z" />
        <!-- 15 : Étoile (Deux Triangles) -->
        <path id="m-15" class="seg m-seg" d="M 400,325 L 475,475 L 325,475 Z M 400,475 L 325,325 L 475,325 Z" />
        <!-- 8 : Sceau \ -->
        <path id="m-8"  class="seg m-seg" d="M 270,300 L 400,400 L 530,300 M 395,405 L 405,405 L 405,395 L 395,395 Z" />
        <!-- 4 : Sceau / -->
        <path id="m-4"  class="seg m-seg" d="M 270,500 L 400,400 L 530,500 M 395,405 L 405,405 L 405,395 L 395,395 Z" />
        <!-- 2 : Ligne Horizontale à Nœuds -->
        <path id="m-2"  class="seg m-seg" d="M 270,400 L 330,400 M 330,390 L 330,410 M 470,390 L 470,410 M 470,400 L 530,400 M 390,400 L 410,400" />
        <!-- 1 : Ligne Verticale à Nœuds -->
        <path id="m-1"  class="seg m-seg" d="M 400,270 L 400,330 M 390,330 L 410,330 M 390,470 L 410,470 M 400,470 L 400,530 M 400,390 L 400,410" />

        <!-- SECONDES (Or Ancien) -->
        <!-- 30 : Très Grand Losange -->
        <path id="s-30" class="seg s-seg" d="M 400,220 L 580,400 L 400,580 L 220,400 Z" />
        <!-- 15 : Grande Étoile -->
        <path id="s-15" class="seg s-seg" d="M 400,290 L 510,510 L 290,510 Z M 400,510 L 290,290 L 510,290 Z" />
        <!-- 8 : Grand Sceau \ -->
        <path id="s-8"  class="seg s-seg" d="M 220,260 L 400,400 L 580,260 M 395,405 L 405,405 L 405,395 L 395,395 Z" />
        <!-- 4 : Grand Sceau / -->
        <path id="s-4"  class="seg s-seg" d="M 220,540 L 400,400 L 580,540 M 395,405 L 405,405 L 405,395 L 395,395 Z" />
        <!-- 2 : Ligne Horizontale à Grands Nœuds -->
        <path id="s-2"  class="seg s-seg" d="M 220,400 L 300,400 M 290,390 L 290,410 M 510,390 L 510,410 M 500,400 L 580,400 M 385,400 L 415,400" />
        <!-- 1 : Ligne Verticale à Grands Nœuds -->
        <path id="s-1"  class="seg s-seg" d="M 400,220 L 400,300 M 390,290 L 410,290 M 390,510 L 410,510 M 400,500 L 400,580 M 400,385 L 400,415" />
    </g>

    <script type="text/javascript">
        //<![CDATA[
        const seqH = [15, 8, 4, 2, 1]; const seqMS = [30, 15, 8, 4, 2, 1];
        function updatePole(p, v, s) { let r = v; s.forEach(w => { const e = document.getElementById(`${p}-${w}`); if(!e) return; if(r >= w) { e.classList.add('on'); r -= w; } else { e.classList.remove('on'); } }); }
        function updateClock() { const n = new Date(); updatePole('h', n.getHours(), seqH); updatePole('m', n.getMinutes(), seqMS); updatePole('s', n.getSeconds(), seqMS); }
        setInterval(updateClock, 1000); updateClock();
        //]]>
    </script>
</svg>
