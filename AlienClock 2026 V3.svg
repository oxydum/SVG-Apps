<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

    <rect width="100%" height="100%" fill="#020208"/>

    <style>
        :root {
        --width-off: 1;
        --width-on: 3;
        }

        .seg {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: var(--width-off);

        /* État Éteint */
        opacity: 0.1;
        transform: scale(0.85);

        /* Zoom centré parfait */
        transform-box: view-box;
        transform-origin: 400px 400px;

        /* Persistance fluide (Apparition rapide, disparition lente) */
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 1s cubic-bezier(0.4, 0, 0.2, 1),
        stroke 0.4s ease,
        stroke-width 0.4s ease,
        filter 0.8s ease;
        }

        .seg.on {
        stroke-width: var(--width-on);
        /* État Allumé */
        opacity: 1;
        transform: scale(1);
        }

        /* === COULEURS SECONDES (Cyan Holographique) === */
        .s-seg { stroke: #091518; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #00f0ff; filter: drop-shadow(0 0 8px #00f0ff); }

        /* === COULEURS MINUTES (Magenta Laser) === */
        .m-seg { stroke: #180912; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #ff2a6d; filter: drop-shadow(0 0 8px #ff2a6d); }

        /* === COULEURS HEURES (Bleu Navigateur) === */
        .h-seg { stroke: #0a0a15; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #2a4a9a; filter: drop-shadow(0 0 8px #2a4a9a); }
    </style>

    <!-- CHEMINS "GALAXIE LOINTAINE" -->
    <g>

        <!-- HEURES (Bleu) -->
        <!-- 15 : Orbite incomplète (Arc de 270°) -->
        <path id="h-15" class="seg h-seg" d="M 440,400 A 40,40 0 1,0 400,360" />
        <!-- 8 : Trajectoire hyperspace \ -->
        <path id="h-8"  class="seg h-seg" d="M 360,375 C 385,415 385,385 440,390" />
        <!-- 4 : Trajectoire hyperspace / -->
        <path id="h-4"  class="seg h-seg" d="M 360,425 C 385,385 385,415 440,410" />
        <!-- 2 : Réticule Hexagonal -->
        <path id="h-2"  class="seg h-seg" d="M 360,400 L 385,390 L 415,390 L 440,400 L 415,410 L 385,410 Z" />
        <!-- 1 : Faisceau Laser avec impact -->
        <path id="h-1"  class="seg h-seg" d="M 400,360 L 400,385 L 410,400 L 400,415 L 400,440 M 390,400 L 410,400" />

        <!-- MINUTES (Magenta) -->
        <!-- 30 : Grande Orbite incomplète (Arc de 270°) -->
        <path id="m-30" class="seg m-seg" d="M 530,400 A 130,130 0 1,0 400,270" />
        <!-- 15 : Petite Orbite incomplète opposée -->
        <path id="m-15" class="seg m-seg" d="M 325,400 A 75,75 0 1,1 400,475" />
        <!-- 8 : Trajectoire hyperspace \ -->
        <path id="m-8"  class="seg m-seg" d="M 270,300 C 340,450 420,320 530,350" />
        <!-- 4 : Trajectoire hyperspace / -->
        <path id="m-4"  class="seg m-seg" d="M 270,500 C 340,350 420,480 530,450" />
        <!-- 2 : Réticule Hexagonal -->
        <path id="m-2"  class="seg m-seg" d="M 270,400 L 345,385 L 455,385 L 530,400 L 455,415 L 345,415 Z" />
        <!-- 1 : Faisceau Laser avec impact -->
        <path id="m-1"  class="seg m-seg" d="M 400,270 L 400,355 L 415,400 L 400,445 L 400,530 M 385,400 L 415,400" />

        <!-- SECONDES (Cyan) -->
        <!-- 30 : Grande Orbite incomplète (Arc de 270°) -->
        <path id="s-30" class="seg s-seg" d="M 580,400 A 180,180 0 1,1 400,220" />
        <!-- 15 : Petite Orbite incomplète opposée -->
        <path id="s-15" class="seg s-seg" d="M 290,400 A 110,110 0 1,0 400,510" />
        <!-- 8 : Trajectoire hyperspace \ -->
        <path id="s-8"  class="seg s-seg" d="M 220,260 C 330,480 470,300 580,340" />
        <!-- 4 : Trajectoire hyperspace / -->
        <path id="s-4"  class="seg s-seg" d="M 220,540 C 330,320 470,500 580,260" />
        <!-- 2 : Réticule Hexagonal -->
        <path id="s-2"  class="seg s-seg" d="M 220,400 L 340,380 L 460,380 L 580,400 L 460,420 L 340,420 Z" />
        <!-- 1 : Faisceau Laser avec impact -->
        <path id="s-1"  class="seg s-seg" d="M 400,220 L 400,370 L 415,400 L 400,430 L 400,580 M 385,400 L 415,400" />

    </g>

    <script type="text/javascript">
        //<![CDATA[

        const seqH = [15, 8, 4, 2, 1];
        const seqMS = [30, 15, 8, 4, 2, 1];

        function updatePole(prefix, value, sequence) {
        let remainder = value;

        sequence.forEach(segmentWeight => {
        const el = document.getElementById(`${prefix}-${segmentWeight}`);
        if (!el) return;

        if (remainder >= segmentWeight) {
        el.classList.add('on');
        remainder -= segmentWeight;
        } else {
        el.classList.remove('on');
        }
        });
        }

        function updateClock() {
        const now = new Date();
        updatePole('h', now.getHours(), seqH);
        updatePole('m', now.getMinutes(), seqMS);
        updatePole('s', now.getSeconds(), seqMS);
        }

        setInterval(updateClock, 1000);
        updateClock();

        //]]>
    </script>

</svg>
