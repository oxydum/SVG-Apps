<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

    <rect width="100%" height="100%" fill="#020208"/>

    <style>
        :root {
        --width-off: 1;
        --width-on: 3;
        }

        .seg {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: var(--width-off);

        /* État Éteint : Léger retrait, transparent, pas de lueur */
        opacity: 0.1;
        transform: scale(0.85);

        /* LA CLÉ DU ZOOM PARFAIT :
        On force le zoom à se faire par rapport au centre du viewBox (400, 400) */
        transform-box: view-box;
        transform-origin: 400px 400px;

        /* Courbe de persistance sur mesure : apparition rapide, disparition lente */
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 1s cubic-bezier(0.4, 0, 0.2, 1),
        stroke 0.4s ease,
        stroke-width 0.4s ease,
        filter 0.8s ease;
        }

        .seg.on {
        stroke-width: var(--width-on);
        /* État Allumé : Taille normale, opaque, lumineux */
        opacity: 1;
        transform: scale(1);
        }

        /* === COULEURS ET LUEURS SECONDES (Cyan) === */
        .s-seg { stroke: #091518; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #00f0ff; filter: drop-shadow(0 0 8px #00f0ff); }

        /* === COULEURS ET LUEURS MINUTES (Magenta) === */
        .m-seg { stroke: #180912; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #ff2a6d; filter: drop-shadow(0 0 8px #ff2a6d); }

        /* === COULEURS ET LUEURS HEURES (Bleu) === */
        .h-seg { stroke: #0a0a15; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #2a4a9a; filter: drop-shadow(0 0 8px #2a4a9a); }
    </style>

    <!-- Les chemins sont toujours en taille maximale. C'est le CSS (scale 0.85 -> 1) qui les anime -->
    <g>

        <!-- Heures -->
        <path id="h-15" class="seg h-seg" d="M 360,400 A 40,40 0 1,1 440,400 A 40,40 0 1,1 360,400" />
        <path id="h-8"  class="seg h-seg" d="M 360,378 Q 400,458 440,378" />
        <path id="h-4"  class="seg h-seg" d="M 360,422 Q 400,342 440,422" />
        <path id="h-2"  class="seg h-seg" d="M 360,400 L 440,400" />
        <path id="h-1"  class="seg h-seg" d="M 400,360 L 400,440" />

        <!-- Minutes -->
        <path id="m-30" class="seg m-seg" d="M 270,400 A 130,130 0 1,1 530,400 A 130,130 0 1,1 270,400" />
        <path id="m-15" class="seg m-seg" d="M 325,400 A 75,75 0 1,1 475,400 A 75,75 0 1,1 325,400" />
        <path id="m-8"  class="seg m-seg" d="M 270,328 Q 400,590 530,328" />
        <path id="m-4"  class="seg m-seg" d="M 270,472 Q 400,210 530,472" />
        <path id="m-2"  class="seg m-seg" d="M 270,400 L 530,400" />
        <path id="m-1"  class="seg m-seg" d="M 400,270 L 400,530" />

        <!-- Secondes -->
        <path id="s-30" class="seg s-seg" d="M 220,400 A 180,180 0 1,1 580,400 A 180,180 0 1,1 220,400" />
        <path id="s-15" class="seg s-seg" d="M 290,400 A 110,110 0 1,1 510,400 A 110,110 0 1,1 290,400" />
        <path id="s-8"  class="seg s-seg" d="M 220,300 Q 400,660 580,300" />
        <path id="s-4"  class="seg s-seg" d="M 220,500 Q 400,140 580,500" />
        <path id="s-2"  class="seg s-seg" d="M 220,400 L 580,400" />
        <path id="s-1"  class="seg s-seg" d="M 400,220 L 400,580" />

    </g>

    <script type="text/javascript">
        //<![CDATA[

        const seqH = [15, 8, 4, 2, 1];
        const seqMS = [30, 15, 8, 4, 2, 1];

        function updatePole(prefix, value, sequence) {
        let remainder = value;

        sequence.forEach(segmentWeight => {
        const el = document.getElementById(`${prefix}-${segmentWeight}`);
        if (!el) return;

        if (remainder >= segmentWeight) {
        el.classList.add('on');
        remainder -= segmentWeight;
        } else {
        el.classList.remove('on');
        }
        });
        }

        function updateClock() {
        const now = new Date();
        updatePole('h', now.getHours(), seqH);
        updatePole('m', now.getMinutes(), seqMS);
        updatePole('s', now.getSeconds(), seqMS);
        }

        setInterval(updateClock, 1000);
        updateClock();

        //]]>
    </script>

</svg>
