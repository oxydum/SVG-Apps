<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#0A0015"/>

    <style>
        :root { --width-off: 1; --width-on: 3; }
        .seg {
        fill: none; stroke-linecap: square; stroke-linejoin: miter; /* Angles carrés rétro */
        stroke-width: var(--width-off); opacity: 0.1; transform: scale(0.85);
        transform-box: view-box; transform-origin: 400px 400px;
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s ease, stroke-width 0.4s ease, filter 0.8s ease;
        }
        .seg.on { stroke-width: var(--width-on); opacity: 1; transform: scale(1); }

        .s-seg { stroke: #150510; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #FF10F0; filter: drop-shadow(0 0 8px #FF00FF); } /* Rose Fluor */

        .m-seg { stroke: #051510; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #00FFFF; filter: drop-shadow(0 0 8px #00CED1); } /* Cyan */

        .h-seg { stroke: #100515; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #BF00FF; filter: drop-shadow(0 0 8px #9400D3); } /* Violet */
    </style>

    <g>
        <!-- HEURES (Violet) -->
        <!-- 15 : Petit arc de soleil couchant -->
        <path id="h-15" class="seg h-seg" d="M 360,400 A 40,40 0 0,1 440,400 M 360,400 L 440,400" />
        <!-- 8 : Ligne de perspective \ -->
        <path id="h-8"  class="seg h-seg" d="M 360,440 L 440,360" />
        <!-- 4 : Ligne de perspective / -->
        <path id="h-4"  class="seg h-seg" d="M 360,360 L 440,440" />
        <!-- 2 : Micro Equalizer H -->
        <path id="h-2"  class="seg h-seg" d="M 360,400 L 440,400 M 380,400 L 380,410 M 400,400 L 400,415 M 420,400 L 420,408" />
        <!-- 1 : Micro Equalizer V -->
        <path id="h-1"  class="seg h-seg" d="M 400,360 L 400,440 M 400,380 L 390,380 M 400,400 L 385,400 M 400,420 L 390,420" />

        <!-- MINUTES (Cyan) -->
        <!-- 30 : Demi-soleil couchant + Ligne d'horizon -->
        <path id="m-30" class="seg m-seg" d="M 270,400 A 130,130 0 0,1 530,400 M 270,400 L 530,400" />
        <!-- 15 : Petit soleil couchant -->
        <path id="m-15" class="seg m-seg" d="M 325,400 A 75,75 0 0,1 475,400 M 325,400 L 475,400" />
        <!-- 8 : Grille de perspective \ -->
        <path id="m-8"  class="seg m-seg" d="M 270,550 L 530,250 M 270,500 L 530,300" />
        <!-- 4 : Grille de perspective / -->
        <path id="m-4"  class="seg m-seg" d="M 270,250 L 530,550 M 270,300 L 530,500" />
        <!-- 2 : Equalizer H -->
        <path id="m-2"  class="seg m-seg" d="M 270,400 L 530,400 M 300,400 L 300,420 M 350,400 L 350,430 M 400,400 L 400,415 M 450,400 L 450,430 M 500,400 L 500,420" />
        <!-- 1 : Equalizer V -->
        <path id="m-1"  class="seg m-seg" d="M 400,270 L 400,530 M 400,300 L 380,300 M 400,360 L 370,360 M 400,430 L 375,430 M 400,500 L 380,500" />

        <!-- SECONDES (Rose Fluor) -->
        <!-- 30 : Grand Demi-soleil couchant + Horizon -->
        <path id="s-30" class="seg s-seg" d="M 220,400 A 180,180 0 0,1 580,400 M 220,400 L 580,400" />
        <!-- 15 : Soleil couchant moyen -->
        <path id="s-15" class="seg s-seg" d="M 290,400 A 110,110 0 0,1 510,400 M 290,400 L 510,400" />
        <!-- 8 : Grande Grille de perspective \ -->
        <path id="s-8"  class="seg s-seg" d="M 220,600 L 580,200 M 220,550 L 580,250 M 220,500 L 580,300" />
        <!-- 4 : Grande Grille de perspective / -->
        <path id="s-4"  class="seg s-seg" d="M 220,200 L 580,600 M 220,250 L 580,550 M 220,300 L 580,500" />
        <!-- 2 : Grand Equalizer H -->
        <path id="s-2"  class="seg s-seg" d="M 220,400 L 580,400 M 250,400 L 250,425 M 310,400 L 310,435 M 370,400 L 370,420 M 430,400 L 430,435 M 490,400 L 490,425 M 550,400 L 550,415" />
        <!-- 1 : Grand Equalizer V -->
        <path id="s-1"  class="seg s-seg" d="M 400,220 L 400,580 M 400,250 L 375,250 M 400,330 L 365,330 M 400,400 L 360,400 M 400,470 L 365,470 M 400,550 L 375,550" />
    </g>

    <script type="text/javascript">
        //<![CDATA[
        const seqH = [15, 8, 4, 2, 1]; const seqMS = [30, 15, 8, 4, 2, 1];
        function updatePole(p, v, s) { let r = v; s.forEach(w => { const e = document.getElementById(`${p}-${w}`); if(!e) return; if(r >= w) { e.classList.add('on'); r -= w; } else { e.classList.remove('on'); } }); }
        function updateClock() { const n = new Date(); updatePole('h', n.getHours(), seqH); updatePole('m', n.getMinutes(), seqMS); updatePole('s', n.getSeconds(), seqMS); }
        setInterval(updateClock, 1000); updateClock();
        //]]>
    </script>
</svg>
