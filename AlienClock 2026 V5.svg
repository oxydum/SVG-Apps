<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#05050A"/>

    <style>
        :root { --width-off: 1; --width-on: 3; }
        .seg {
        fill: none; stroke-linecap: round; stroke-linejoin: round;
        stroke-width: var(--width-off); opacity: 0.1; transform: scale(0.85);
        transform-box: view-box; transform-origin: 400px 400px;
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s ease, stroke-width 0.4s ease, filter 0.8s ease;
        }
        .seg.on { stroke-width: var(--width-on); opacity: 1; transform: scale(1); }

        .s-seg { stroke: #1A1A10; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #FFD700; filter: drop-shadow(0 0 8px #D4AF37); } /* Or */

        .m-seg { stroke: #0A1A10; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #50C878; filter: drop-shadow(0 0 8px #2E8B57); } /* Émeraude */

        .h-seg { stroke: #1A1005; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #CD7F32; filter: drop-shadow(0 0 8px #8B4513); } /* Bronze */
    </style>

    <g>
        <!-- HEURES (Bronze) -->
        <!-- 15 : Octogone -->
        <path id="h-15" class="seg h-seg" d="M 400,360 L 428,372 L 440,400 L 428,428 L 400,440 L 372,428 L 360,400 L 372,372 Z" />
        <!-- 8 : Chevron \ -->
        <path id="h-8"  class="seg h-seg" d="M 360,375 L 400,400 L 440,375" />
        <!-- 4 : Chevron / -->
        <path id="h-4"  class="seg h-seg" d="M 360,425 L 400,400 L 440,425" />
        <!-- 2 : Pyramide Horizontale -->
        <path id="h-2"  class="seg h-seg" d="M 360,400 L 390,385 L 410,385 L 440,400 L 410,415 L 390,415 Z" />
        <!-- 1 : Pyramide Verticale -->
        <path id="h-1"  class="seg h-seg" d="M 400,360 L 385,390 L 385,410 L 400,440 L 415,410 L 415,390 Z" />

        <!-- MINUTES (Émeraude) -->
        <!-- 30 : Grand Octogone -->
        <path id="m-30" class="seg m-seg" d="M 400,270 L 491,309 L 530,400 L 491,491 L 400,530 L 309,491 L 270,400 L 309,309 Z" />
        <!-- 15 : Petit Octogone -->
        <path id="m-15" class="seg m-seg" d="M 400,325 L 453,347 L 475,400 L 453,453 L 400,475 L 347,453 L 325,400 L 347,347 Z" />
        <!-- 8 : Double Chevron \ -->
        <path id="m-8"  class="seg m-seg" d="M 270,300 L 400,370 L 530,300 M 270,340 L 400,410 L 530,340" />
        <!-- 4 : Double Chevron / -->
        <path id="m-4"  class="seg m-seg" d="M 270,500 L 400,430 L 530,500 M 270,460 L 400,390 L 530,460" />
        <!-- 2 : Grande Pyramide Horizontale -->
        <path id="m-2"  class="seg m-seg" d="M 270,400 L 360,380 L 440,380 L 530,400 L 440,420 L 360,420 Z" />
        <!-- 1 : Grande Pyramide Verticale -->
        <path id="m-1"  class="seg m-seg" d="M 400,270 L 380,360 L 380,440 L 400,530 L 420,440 L 420,360 Z" />

        <!-- SECONDES (Or) -->
        <!-- 30 : Très Grand Octogone -->
        <path id="s-30" class="seg s-seg" d="M 400,220 L 527,273 L 580,400 L 527,527 L 400,580 L 273,527 L 220,400 L 273,273 Z" />
        <!-- 15 : Octogone Moyen -->
        <path id="s-15" class="seg s-seg" d="M 400,290 L 478,322 L 510,400 L 478,478 L 400,510 L 322,478 L 290,400 L 322,322 Z" />
        <!-- 8 : Triple Chevron \ -->
        <path id="s-8"  class="seg s-seg" d="M 220,260 L 400,370 L 580,260 M 220,300 L 400,410 L 580,300 M 220,340 L 400,450 L 580,340" />
        <!-- 4 : Triple Chevron / -->
        <path id="s-4"  class="seg s-seg" d="M 220,540 L 400,430 L 580,540 M 220,500 L 400,390 L 580,500 M 220,460 L 400,350 L 580,460" />
        <!-- 2 : Énorme Pyramide Horizontale -->
        <path id="s-2"  class="seg s-seg" d="M 220,400 L 340,375 L 460,375 L 580,400 L 460,425 L 340,425 Z" />
        <!-- 1 : Énorme Pyramide Verticale -->
        <path id="s-1"  class="seg s-seg" d="M 400,220 L 375,340 L 375,460 L 400,580 L 425,460 L 425,340 Z" />
    </g>

    <script type="text/javascript">
        //<![CDATA[
        const seqH = [15, 8, 4, 2, 1]; const seqMS = [30, 15, 8, 4, 2, 1];
        function updatePole(p, v, s) { let r = v; s.forEach(w => { const e = document.getElementById(`${p}-${w}`); if(!e) return; if(r >= w) { e.classList.add('on'); r -= w; } else { e.classList.remove('on'); } }); }
        function updateClock() { const n = new Date(); updatePole('h', n.getHours(), seqH); updatePole('m', n.getMinutes(), seqMS); updatePole('s', n.getSeconds(), seqMS); }
        setInterval(updateClock, 1000); updateClock();
        //]]>
    </script>
</svg>
