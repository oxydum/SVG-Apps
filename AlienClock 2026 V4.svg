<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#010108"/>

    <style>
        :root { --width-off: 1; --width-on: 3; }
        .seg {
        fill: none; stroke-linecap: square; stroke-linejoin: miter; /* Angles vifs */
        stroke-width: var(--width-off); opacity: 0.1; transform: scale(0.85);
        transform-box: view-box; transform-origin: 400px 400px;
        transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s ease, stroke-width 0.4s ease, filter 0.8s ease;
        }
        .seg.on { stroke-width: var(--width-on); opacity: 1; transform: scale(1); }

        .s-seg { stroke: #0A0A05; filter: drop-shadow(0 0 0px transparent); }
        .s-seg.on { stroke: #FFFF00; filter: drop-shadow(0 0 8px #FFFF00); } /* Jaune */

        .m-seg { stroke: #050A05; filter: drop-shadow(0 0 0px transparent); }
        .m-seg.on { stroke: #39FF14; filter: drop-shadow(0 0 8px #39FF14); } /* Vert Acide */

        .h-seg { stroke: #0A050A; filter: drop-shadow(0 0 0px transparent); }
        .h-seg.on { stroke: #FF00FF; filter: drop-shadow(0 0 8px #FF00FF); } /* Magenta */
    </style>

    <g>
        <!-- HEURES (Magenta) -->
        <!-- 15 : Carré Rotatif 45° -->
        <path id="h-15" class="seg h-seg" d="M 400,360 L 440,400 L 400,440 L 360,400 Z" />
        <!-- 8 : Trace Circuit \ -->
        <path id="h-8"  class="seg h-seg" d="M 360,375 L 400,375 L 400,425 L 440,425" />
        <!-- 4 : Trace Circuit / -->
        <path id="h-4"  class="seg h-seg" d="M 360,425 L 400,425 L 400,375 L 440,375" />
        <!-- 2 : Segment Horizontal avec Nœuds -->
        <path id="h-2"  class="seg h-seg" d="M 360,395 L 375,395 L 380,400 L 375,405 L 360,405 M 440,395 L 425,395 L 420,400 L 425,405 L 440,405 M 390,400 L 410,400" />
        <!-- 1 : Segment Vertical avec Nœuds -->
        <path id="h-1"  class="seg h-seg" d="M 395,360 L 395,375 L 400,380 L 405,375 L 405,360 M 395,440 L 395,425 L 400,420 L 405,425 L 405,440 M 400,390 L 400,410" />

        <!-- MINUTES (Vert Acide) -->
        <!-- 30 : Carré Rotatif 45° -->
        <path id="m-30" class="seg m-seg" d="M 400,270 L 530,400 L 400,530 L 270,400 Z" />
        <!-- 15 : Carré Droit -->
        <path id="m-15" class="seg m-seg" d="M 325,325 L 475,325 L 475,475 L 325,475 Z" />
        <!-- 8 : Escalier Circuit \ -->
        <path id="m-8"  class="seg m-seg" d="M 270,300 L 350,300 L 350,400 L 450,400 L 450,500 L 530,500" />
        <!-- 4 : Escalier Circuit / -->
        <path id="m-4"  class="seg m-seg" d="M 270,500 L 350,500 L 350,400 L 450,400 L 450,300 L 530,300" />
        <!-- 2 : Bus Horizontal -->
        <path id="m-2"  class="seg m-seg" d="M 270,390 L 340,390 L 350,400 L 340,410 L 270,410 M 530,390 L 460,390 L 450,400 L 460,410 L 530,410 M 365,400 L 435,400" />
        <!-- 1 : Bus Vertical -->
        <path id="m-1"  class="seg m-seg" d="M 390,270 L 390,340 L 400,350 L 410,340 L 410,270 M 390,530 L 390,460 L 400,450 L 410,460 L 410,530 M 400,365 L 400,435" />

        <!-- SECONDES (Jaune) -->
        <!-- 30 : Grand Carré Rotatif 45° -->
        <path id="s-30" class="seg s-seg" d="M 400,220 L 580,400 L 400,580 L 220,400 Z" />
        <!-- 15 : Carré Droit -->
        <path id="s-15" class="seg s-seg" d="M 290,290 L 510,290 L 510,510 L 290,510 Z" />
        <!-- 8 : Grand Escalier Circuit \ -->
        <path id="s-8"  class="seg s-seg" d="M 220,250 L 380,250 L 380,400 L 420,400 L 420,550 L 580,550" />
        <!-- 4 : Grand Escalier Circuit / -->
        <path id="s-4"  class="seg s-seg" d="M 220,550 L 380,550 L 380,400 L 420,400 L 420,250 L 580,250" />
        <!-- 2 : Méga Bus Horizontal -->
        <path id="s-2"  class="seg s-seg" d="M 220,390 L 320,390 L 330,400 L 320,410 L 220,410 M 580,390 L 480,390 L 470,400 L 480,410 L 580,410 M 345,400 L 455,400" />
        <!-- 1 : Méga Bus Vertical -->
        <path id="s-1"  class="seg s-seg" d="M 390,220 L 390,320 L 400,330 L 410,320 L 410,220 M 390,580 L 390,480 L 400,470 L 410,480 L 410,580 M 400,345 L 400,455" />
    </g>

    <script type="text/javascript">
        //<![CDATA[
        const seqH = [15, 8, 4, 2, 1]; const seqMS = [30, 15, 8, 4, 2, 1];
        function updatePole(p, v, s) { let r = v; s.forEach(w => { const e = document.getElementById(`${p}-${w}`); if(!e) return; if(r >= w) { e.classList.add('on'); r -= w; } else { e.classList.remove('on'); } }); }
        function updateClock() { const n = new Date(); updatePole('h', n.getHours(), seqH); updatePole('m', n.getMinutes(), seqMS); updatePole('s', n.getSeconds(), seqMS); }
        setInterval(updateClock, 1000); updateClock();
        //]]>
    </script>
</svg>
